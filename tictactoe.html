<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
      color: #e94560;
    }

    .status {
      font-size: 1.1rem;
      margin-bottom: 30px;
      min-height: 1.5rem;
      color: #a0a0c0;
    }

    .status span {
      font-weight: bold;
      color: #e94560;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 30px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #0f9bff; }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .score-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 12px 28px;
      min-width: 90px;
    }

    .score-box .label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #a0a0c0;
      margin-bottom: 4px;
    }

    .score-box .value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x .value { color: #e94560; }
    .score-box.draw .value { color: #a0a0c0; }
    .score-box.o .value { color: #0f9bff; }

    .btn {
      padding: 12px 36px;
      font-size: 1rem;
      letter-spacing: 2px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      font-weight: bold;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: #c73652;
      transform: scale(1.04);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>
    <div class="status" id="status">Player <span>X</span>'s turn</div>

    <div class="scoreboard">
      <div class="score-box x">
        <div class="label">PLAYER X</div>
        <div class="value" id="score-x">0</div>
      </div>
      <div class="score-box draw">
        <div class="label">DRAWS</div>
        <div class="value" id="score-draw">0</div>
      </div>
      <div class="score-box o">
        <div class="label">PLAYER O</div>
        <div class="value" id="score-o">0</div>
      </div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button class="btn" id="restart">RESTART</button>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus(`Player <span>${current}</span>'s turn`);
    }

    function setStatus(html) { statusEl.innerHTML = html; }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[b] === board[c])
          return { winner: board[a], combo: [a, b, c] };
      }
      if (board.every(v => v)) return { winner: null, combo: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner) {
            result.combo.forEach(i => cells[i].classList.add('winner'));
            scores[result.winner]++;
            updateScores();
            setStatus(`Player <span>${result.winner}</span> wins!`);
          } else {
            scores.draw++;
            updateScores();
            setStatus(`It's a <span>draw</span>!`);
          }
          return;
        }

        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player <span>${current}</span>'s turn`);
      });
    });

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
